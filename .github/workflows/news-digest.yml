name: news-digest

# cron は UTC 基準。21:00 UTC = 翌 06:00 JST。
# LLM APIは使用しないため、シークレット登録は一切不要（運用コスト0円）。
on:
  schedule:
    - cron: "0 21 * * *"   # 毎日 06:00 JST
  workflow_dispatch:

permissions:
  contents: write          # ダイジェストをリポジトリにコミットするために必要

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build digest
        run: node scripts/build-digest.js

      - name: Commit digest
        # コミット作者はリポジトリ所有者本人にする。
        # Vercel HobbyプランはprivateリポジトリでVercelアカウントに紐付いていない
        # 作者（例: actions@users.noreply.github.com のボット名義）のコミットを
        # "Deployment Blocked" として弾くため。
        run: |
          git config user.name "DanK217"
          git config user.email "xoxo.aaa72@gmail.com"
          git add digests/
          git diff --cached --quiet || git commit -m "Add news digest for $(TZ=Asia/Tokyo date +%Y-%m-%d)"
          git push
