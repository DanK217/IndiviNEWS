<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1920px; height:1080px; overflow:hidden; }
  body {
    background:#0d0d0d; color:#ffffff;
    font-family:"Yu Gothic UI","Segoe UI","Hiragino Sans",Meiryo,sans-serif;
    display:flex; flex-direction:column; padding:72px 96px 56px;
  }
  .kicker { display:flex; align-items:center; gap:18px; margin-bottom:44px; }
  .kicker-bar { width:14px; height:14px; border-radius:3px; background:#ff5b3d; }
  .kicker-label { font-size:26px; letter-spacing:.18em; font-weight:700; color:#898781; text-transform:uppercase; }
  .body { flex:1; display:flex; flex-direction:column; min-height:0; }
  h1 { font-size:66px; font-weight:700; line-height:1.25; letter-spacing:.01em; }
  h1 .em { color:#ff5b3d; }
  .footer { display:flex; justify-content:space-between; align-items:center; margin-top:40px; }
  .footer-left { font-size:22px; color:#898781; }
  .footer-right { font-size:24px; color:#898781; font-variant-numeric:tabular-nums; }
  .card { background:#1a1a19; border:1px solid rgba(255,255,255,0.10); border-radius:16px; padding:40px 48px; }
  .lead { font-size:34px; color:#c3c2b7; line-height:1.7; }
  ul.pts { list-style:none; display:flex; flex-direction:column; gap:30px; }
  ul.pts li { font-size:34px; line-height:1.6; color:#ffffff; padding-left:44px; position:relative; }
  ul.pts li::before { content:""; position:absolute; left:8px; top:22px; width:12px; height:12px; border-radius:50%; background:#ff5b3d; }
  ul.pts li .sub { display:block; font-size:27px; color:#c3c2b7; margin-top:6px; }
  .mono { font-family:Consolas,monospace; }
  .muted { color:#898781; }
  .num { font-variant-numeric:tabular-nums; }
  table { border-collapse:collapse; width:100%; }
  th { font-size:26px; color:#898781; font-weight:700; text-align:left; padding:14px 20px; border-bottom:2px solid #2c2c2a; }
  td { font-size:29px; padding:16px 20px; border-bottom:1px solid #2c2c2a; color:#ffffff; }
  td.c, th.c { text-align:center; }
  .chip { display:inline-flex; align-items:center; gap:12px; }
  .chip .dot { width:16px; height:16px; border-radius:50%; flex:none; }
</style></head><body>
  <div class="kicker"><span class="kicker-bar"></span><span class="kicker-label">背景と目的</span></div>
  <div class="body">
  <h1 style="margin-bottom:56px;">「最上位モデルは価格差ぶん賢いのか？」を<br>定量で確かめたい</h1>
  <ul class="pts">
    <li>題材: 完全個人利用のニュースアプリ（iPhoneウィジェット＋毎朝の自動ダイジェスト）
      <span class="sub">Hacker News・はてなブックマーク・Zenn/Publickey を集約</span></li>
    <li>制約: <b>ランニングコスト0円</b>（Vercel／GitHub Actions無料枠のみ）</li>
    <li>好機: 最上位モデル Fable 5 がプラン内で使えるのは <b>7/7まで</b>
      <span class="sub">→ 期限までに「AIの力を測る」実験を仕込んだ</span></li>
  </ul></div>
  <div class="footer">
    <span class="footer-left">IndiviNEWS — 同一仕様・4モデル実装比較実験</span>
    <span class="footer-right">2 / 11</span>
  </div>
</body></html>
